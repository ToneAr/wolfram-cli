name: Release

on:
  push:
    tags:
      - "build*"
      - "v*"

permissions:
  contents: write

jobs:
  build:
    name: Build ${{ matrix.name }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: linux-x86_64
            os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            archive: tar.gz
          - name: linux-aarch64
            os: ubuntu-latest
            target: aarch64-unknown-linux-gnu
            archive: tar.gz
          - name: macos-x86_64
            os: macos-latest
            target: x86_64-apple-darwin
            archive: tar.gz
          - name: macos-aarch64
            os: macos-latest
            target: aarch64-apple-darwin
            archive: tar.gz
          - name: windows-x86_64
            os: windows-latest
            target: x86_64-pc-windows-msvc
            archive: zip

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install Linux cross linker
        if: matrix.target == 'aarch64-unknown-linux-gnu'
        run: sudo apt-get update && sudo apt-get install -y gcc-aarch64-linux-gnu

      - name: Configure Linux cross linker
        if: matrix.target == 'aarch64-unknown-linux-gnu'
        run: echo "CARGO_TARGET_AARCH64_UNKNOWN_LINUX_GNU_LINKER=aarch64-linux-gnu-gcc" >> "$GITHUB_ENV"

      - name: Build
        run: cargo build --release --no-default-features --locked --target ${{ matrix.target }}

      - name: Test
        if: matrix.target == 'x86_64-unknown-linux-gnu' || matrix.target == 'x86_64-apple-darwin' || matrix.target == 'x86_64-pc-windows-msvc'
        run: cargo test --no-default-features --locked --target ${{ matrix.target }}

      - name: Package Unix
        if: matrix.archive == 'tar.gz'
        shell: bash
        run: |
          set -euo pipefail
          package="wolfram-cli-${{ matrix.name }}"
          mkdir "$package"
          cp "target/${{ matrix.target }}/release/wolfram-cli" "$package/"
          cp README.md "$package/"
          tar -czf "$package.tar.gz" "$package"

      - name: Package Windows
        if: matrix.archive == 'zip'
        shell: pwsh
        run: |
          $package = "wolfram-cli-${{ matrix.name }}"
          New-Item -ItemType Directory -Path $package
          Copy-Item "target/${{ matrix.target }}/release/wolfram-cli.exe" $package
          Copy-Item README.md $package
          Compress-Archive -Path $package -DestinationPath "$package.zip"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: wolfram-cli-${{ matrix.name }}
          path: wolfram-cli-${{ matrix.name }}.${{ matrix.archive }}
          if-no-files-found: error

  release:
    name: Publish release
    if: startsWith(github.ref, 'refs/tags/')
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: Publish GitHub release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*
